<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA 2.5 Flash</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .status-bar { width: 850px; background: #1e2329; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; border: 1px solid #333; margin-bottom: 15px; }
        .card { background: #1e2329; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 400px; text-align: center; position: relative; }
        .price { font-size: 42px; color: #f0b90b; font-weight: bold; margin: 10px 0; }
        .sugestao { font-size: 18px; font-weight: bold; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #444; }
        .gain { color: #02c076; } .loss { color: #cf304a; }
        .btn-buy { background: #02c076; color: white; border: none; padding: 15px; width: 48%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-sell { background: #cf304a; color: white; border: none; padding: 15px; width: 48%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-panic { background: #ff3b3b; color: white; border: none; padding: 15px; width: 850px; margin: 15px 0; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .perf-box { width: 850px; display: flex; gap: 15px; height: 250px; margin-top: 20px; }
        #chat-win { height: 100px; overflow-y: auto; background: #000; width: 830px; padding: 10px; border-radius: 8px; border: 1px solid #333; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1 style="color:#f0b90b">JURITY IA 2.5 FLASH 🦅</h1>
    <div class="status-bar">
        <span>CONTA: <b id="f-conta">--</b></span>
        <span>PATRIMÔNIO: <b id="f-saldo">R$ 0,00</b></span>
        <span>DIA: <b id="f-dia">R$ 0,00</b></span>
    </div>

    <div style="display:flex; gap:15px;">
        <div class="card">
            <h3>WIN <span id="r-win" style="font-size:12px; opacity:0.6">RSI: --</span></h3>
            <div id="sug-win" class="sugestao">ANALISANDO...</div>
            <div id="p-win" class="price">0</div>
            <div>TENDÊNCIA: <b id="t-win">--</b></div>
            <div style="margin:15px 0">LOTES: <input type="number" id="l-win" value="1" style="width:40px; background:#000; color:#fff; border:1px solid #444"></div>
            <button class="btn-buy" onclick="ordem('WIN','BUY')">COMPRAR</button>
            <button class="btn-sell" onclick="ordem('WIN','SELL')">VENDER</button>
        </div>

        <div class="card">
            <h3>WDO <span id="r-wdo" style="font-size:12px; opacity:0.6">RSI: --</span></h3>
            <div id="sug-wdo" class="sugestao">ANALISANDO...</div>
            <div id="p-wdo" class="price">0</div>
            <div>TENDÊNCIA: <b id="t-wdo">--</b></div>
            <div style="margin:15px 0">LOTES: <input type="number" id="l-wdo" value="1" style="width:40px; background:#000; color:#fff; border:1px solid #444"></div>
            <button class="btn-buy" onclick="ordem('WDO','BUY')">COMPRAR</button>
            <button class="btn-sell" onclick="ordem('WDO','SELL')">VENDER</button>
        </div>
    </div>

    <button class="btn-panic" onclick="ordem('ALL','PANIC')">🚨 PANIC BUTTON: ZERAR TUDO 🚨</button>

    <div class="perf-box">
        <div style="flex:2; background:#1e2329; border:1px solid #333; padding:10px; border-radius:8px;"><canvas id="chart"></canvas></div>
        <div style="flex:1; background:#1e2329; border:1px solid #333; padding:10px; border-radius:8px; overflow-y:auto; font-size:11px;" id="hist-list"></div>
    </div>

    <div id="chat-win"></div>
    <input type="text" id="m-in" placeholder="Fale com a Jurity..." style="width:830px; padding:15px; background:#1e2329; color:#fff; border:1px solid #444; border-radius:8px; margin-top:10px;">

    <script>
        const ctx = document.getElementById('chart').getContext('2d');
        let chart = new Chart(ctx, { type:'line', data:{ labels:[], datasets:[{label:'Equity', data:[], borderColor:'#f0b90b', fill:true, backgroundColor:'rgba(240,185,11,0.1)', tension:0.4}] }, options:{ scales:{y:{grid:{color:'#333'}}, x:{display:false}}, plugins:{legend:{display:false}} } });
        
        let ultimaSugestao = { win: "", wdo: "" };
        
        function falar(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'pt-BR';
            window.speechSynthesis.speak(msg);
        }

        async function ordem(ativo, tipo) { 
            const lotes = document.getElementById(`l-${ativo.toLowerCase()}`)?.value || 1;
            await fetch('/set_order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ativo, tipo, lotes})}); 
        }

        async function update() {
            try {
                const res = await fetch('/get_signal'); const d = await res.json();
                
                // Update WIN
                document.getElementById('p-win').innerText = d.win.preco;
                document.getElementById('r-win').innerText = `RSI: ${d.win.rsi}`;
                document.getElementById('t-win').innerText = d.win.tend;
                const sugW = document.getElementById('sug-win');
                sugW.innerText = d.win.sug;
                sugW.className = 'sugestao ' + (d.win.sug.includes('COMPRA') ? 'gain' : d.win.sug.includes('VENDA') ? 'loss' : '');
                
                if(d.win.sug.includes('FORTE') && d.win.sug !== ultimaSugestao.win) {
                    falar("Atenção: Oportunidade de " + d.win.sug + " no Índice.");
                    ultimaSugestao.win = d.win.sug;
                }

                // Update WDO (Lógica similar...)
                document.getElementById('p-wdo').innerText = d.wdo.preco;
                document.getElementById('sug-wdo').innerText = d.wdo.sug;

                // Financeiro e Gráfico
                document.getElementById('f-saldo').innerText = `R$ ${d.fin.saldo_atual.toFixed(2)}`;
                document.getElementById('f-dia').innerText = `R$ ${d.fin.resultado_dia.toFixed(2)}`;
                chart.data.labels = d.historico.map(h => h.horario);
                chart.data.datasets[0].data = d.historico.map(h => h.acumulado);
                chart.update('none');
            } catch(e) {}
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
