<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA v2.6 - Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --border: #333; --green: #00ff88; --red: #ff4d4d; --yellow: #f0b90b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .side-chat { width: 350px; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        
        .account-bar { background: var(--card); border: 2px solid var(--yellow); border-radius: 12px; padding: 15px; display: flex; justify-content: space-around; margin-bottom: 20px; }
        .grid-boletas { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .boleta { background: #0b0e11; padding: 15px; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        .sugestao-ia { background: rgba(240, 185, 11, 0.2); border: 2px solid var(--yellow); padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0px var(--yellow); } 50% { box-shadow: 0 0 15px var(--yellow); } 100% { box-shadow: 0 0 0px var(--yellow); } }
        
        .chat-win { flex: 1; overflow-y: auto; background: #0b0e11; border-radius: 10px; padding: 15px; margin-bottom: 15px; font-size: 0.9em; line-height: 1.4; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { border-bottom: 1px solid #444; padding: 10px; text-align: left; color: #888; font-size: 0.8em; }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 0.9em; }
        
        input, select { background: #1e2329; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn-panic { background: var(--red); color: white; border: 1px solid white; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="account-bar">
            <div><small style="color:#888">CONTA</small><br><b id="conta-id">---</b></div>
            <div><small style="color:#888">EQUITY</small><br><b id="saldo-atual" style="color:var(--green)">R$ 0,00</b></div>
            <div><small style="color:#888">LUCRO DIA</small><br><b id="res-dia">R$ 0,00</b></div>
        </div>

        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <span>Estratégia:</span>
            <select id="sel-est" style="width:250px" onchange="mudarEstrategia()">
                <option value="vortex">Vortex Trend Rider</option>
                <option value="ml">Random Forest Momentum</option>
            </select>
        </div>

        <div class="card" style="border-color: var(--yellow); display:grid; grid-template-columns: 1fr 1fr; text-align:center;">
            <div style="border-right:1px solid #444;">
                <small>WIN ALVOS</small>
                <div id="win-t1" style="font-size:1.4em; font-weight:bold; color:var(--green)">---</div>
                <div id="win-t2" style="font-size:1.4em; font-weight:bold; color:var(--red)">---</div>
            </div>
            <div>
                <small>WDO ALVOS</small>
                <div id="wdo-t1" style="font-size:1.4em; font-weight:bold; color:var(--green)">---</div>
                <div id="wdo-t2" style="font-size:1.4em; font-weight:bold; color:var(--red)">---</div>
            </div>
        </div>

        <div class="grid-boletas">
            <div class="card">
                <h3 style="color:var(--yellow); margin:0">ÍNDICE (WIN): <span id="preco-WIN">---</span></h3>
                <div class="boleta">
                    <div style="grid-column: span 2;"><small>Contratos</small><input type="number" id="lotes-WIN" value="1"></div>
                    <button onclick="ordem('WIN','BUY')" style="background:var(--green); font-weight:bold; border:none; border-radius:5px; padding:12px;">BUY</button>
                    <button onclick="ordem('WIN','SELL')" style="background:var(--red); color:white; font-weight:bold; border:none; border-radius:5px; padding:12px;">SELL</button>
                </div>
                <div id="sug-WIN" class="sugestao-ia" style="display:none;">
                    <div style="font-size:0.7em">NOTA IA: <b id="nota-WIN">0</b></div>
                    <b id="txt-sug-WIN" style="font-size:1.2em">---</b><br>
                    <button onclick="executarSugestao('WIN')" style="width:100%; margin-top:10px; background:white; color:black; font-weight:bold; padding:8px; border:none; border-radius:5px; cursor:pointer;">EXECUTAR AGORA</button>
                </div>
            </div>

            <div class="card">
                <h3 style="color:var(--yellow); margin:0">DÓLAR (WDO): <span id="preco-WDO">---</span></h3>
                <div class="boleta">
                    <div style="grid-column: span 2;"><small>Contratos</small><input type="number" id="lotes-WDO" value="1"></div>
                    <button onclick="ordem('WDO','BUY')" style="background:var(--green); font-weight:bold; border:none; border-radius:5px; padding:12px;">BUY</button>
                    <button onclick="ordem('WDO','SELL')" style="background:var(--red); color:white; font-weight:bold; border:none; border-radius:5px; padding:12px;">SELL</button>
                </div>
                <div id="sug-WDO" class="sugestao-ia" style="display:none;">
                    <div style="font-size:0.7em">NOTA IA: <b id="nota-WDO">0</b></div>
                    <b id="txt-sug-WDO" style="font-size:1.2em">---</b><br>
                    <button onclick="executarSugestao('WDO')" style="width:100%; margin-top:10px; background:white; color:black; font-weight:bold; padding:8px; border:none; border-radius:5px; cursor:pointer;">EXECUTAR AGORA</button>
                </div>
            </div>
        </div>

        <div class="card" style="height:250px;"><canvas id="perfChart"></canvas></div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h4>ORDENS ABERTAS</h4>
                <button class="btn-panic" onclick="panic()">PÂNICO: ZERAR TUDO</button>
            </div>
            <table>
                <thead><tr><th>Ativo</th><th>Lado</th><th>Contratos</th><th>Lucro</th><th>Ação</th></tr></thead>
                <tbody id="tabela-ordens"></tbody>
            </table>
        </div>
    </div>

    <div class="side-chat">
        <h4 style="color:var(--yellow); margin:0 0 15px 0"><i class="fas fa-robot"></i> Jurity IA Analista</h4>
        <div id="chat-win" class="chat-win"></div>
        <input type="text" id="user-input" placeholder="Pergunte (Enter)...">
        <button onclick="enviarChat()" style="background:var(--yellow); color:black; margin-top:10px; font-weight:bold; padding:12px; border:none; border-radius:5px; cursor:pointer;">ENVIAR PERGUNTA</button>
    </div>

    <script>
        const ctx = document.getElementById('perfChart').getContext('2d');
        const chart = new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ label: 'Saldo R$', data: [], borderColor: '#f0b90b', tension: 0.3 }] }, options: { maintainAspectRatio: false } });
        const alarm = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviarChat(); });

        async function atualizar() {
            ['WIN', 'WDO'].forEach(async (at) => {
                const r = await fetch('/get_signal?ativo=' + at);
                const d = await r.json();
                document.getElementById('preco-' + at).innerText = d.preco || '---';
                if(d.alvos) {
                    document.getElementById(at.toLowerCase() + '-t1').innerText = d.alvos.t1;
                    document.getElementById(at.toLowerCase() + '-t2').innerText = d.alvos.t2;
                    const box = document.getElementById('sug-' + at);
                    if(d.alvos.sinal !== "NEUTRO") {
                        box.style.display = 'block';
                        document.getElementById('txt-sug-' + at).innerText = d.alvos.sinal;
                        document.getElementById('nota-' + at).innerText = d.alvos.score;
                        if(d.alvos.score > 8 && box.dataset.played != "true") { alarm.play(); box.dataset.played = "true"; }
                        window['sinal_'+at] = d.alvos.sinal;
                    } else { box.style.display = 'none'; box.dataset.played = "false"; }
                }
            });

            const rFin = await fetch('/get_financeiro');
            const fin = await rFin.json();
            document.getElementById('conta-id').innerText = fin.conta;
            document.getElementById('saldo-atual').innerText = "R$ " + fin.saldo_atual.toLocaleString('pt-BR');
            document.getElementById('res-dia').innerText = "R$ " + fin.resultado_dia.toLocaleString('pt-BR');

            let html = '';
            fin.posicoes.forEach(p => {
                html += `<tr><td>${p.symbol}</td><td style="color:${p.type==0?'#0f8':'#f44'}">${p.type==0?'BUY':'SELL'}</td><td>${p.volume}</td><td>R$ ${p.profit.toFixed(2)}</td><td><button onclick="fechar(${p.ticket})">X</button></td></tr>`;
            });
            document.getElementById('tabela-ordens').innerHTML = html || '<tr><td colspan="5" style="text-align:center">Sem ordens</td></tr>';
        }

        function mudarEstrategia() {
            fetch('/set_estrategia', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ estrategia: document.getElementById('sel-est').value }) });
        }

        function executarSugestao(at) { ordem(at, window['sinal_'+at] === "COMPRA" ? "BUY" : "SELL"); }

        async function ordem(ativo, tipo) {
            const lotes = document.getElementById('lotes-' + ativo).value;
            await fetch('/order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ativo, tipo, lotes }) });
            alert("Ordem " + tipo + " enviada!");
        }

        async function enviarChat() {
            const inp = document.getElementById('user-input');
            const win = document.getElementById('chat-win');
            const txt = inp.value; inp.value = '';
            win.innerHTML += `<p style="color:var(--yellow)"><b>Você:</b> ${txt}</p>`;
            const r = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ mensagem: txt }) });
            const d = await r.json();
            win.innerHTML += `<p style="color:var(--green)"><b>Jurity:</b> ${d.resposta}</p>`;
            win.scrollTop = win.scrollHeight;
        }

        async function panic() { if(confirm("ZERAR TUDO?")) await fetch('/order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tipo: 'PANIC' }) }); }

        setInterval(atualizar, 2000);
        setInterval(() => {
            fetch('/get_historico').then(r => r.json()).then(hist => {
                chart.data.labels = hist.map(h => h.x);
                chart.data.datasets[0].data = hist.map(h => h.y);
                chart.update();
            });
        }, 5000);
    </script>
</body>
</html>
