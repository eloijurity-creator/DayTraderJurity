<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA - Trading Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --border: #333; --green: #00ff88; --red: #ff4d4d; --yellow: #f0b90b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .main-container { max-width: 1200px; margin: 0 auto; text-align: center; }
        
        .logo { width: 100px; margin-bottom: 10px; }
        
        /* Novo Card de Conta Expandido */
        .account-card { background: var(--card); border: 2px solid var(--yellow); border-radius: 12px; padding: 15px; display: inline-flex; gap: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 0.9em; }
        .acc-item { border-right: 1px solid #444; padding-right: 20px; text-align: left; }
        .acc-item:last-child { border-right: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; text-align: left; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; position: relative; }

        /* Boleta e Sugestão */
        .boleta { margin-top: 15px; display: flex; gap: 8px; align-items: center; background: #0b0e11; padding: 10px; border-radius: 10px; }
        .input-lotes { width: 60px; background: #1e2329; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; text-align: center; }
        .btn-trade { border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; flex-grow: 1; }
        .btn-buy { background: var(--green); color: black; }
        .btn-sell { background: var(--red); color: white; }
        
        .sugestao-box { background: rgba(240, 185, 11, 0.15); border: 2px solid var(--yellow); border-radius: 12px; padding: 12px; margin-top: 15px; display: none; text-align: center; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0px var(--yellow); } 50% { box-shadow: 0 0 15px var(--yellow); } }

        /* Gráfico e Chat */
        .chart-wrap { height: 250px; width: 100%; position: relative; }
        .chat-win { height: 180px; overflow-y: auto; background: #0b0e11; padding: 15px; border-radius: 10px; border: 1px solid #333; margin: 10px 0; font-size: 0.9em; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #888; border-bottom: 1px solid #333; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="main-container">
    <img src="/static/logo_jurity.png" class="logo">
    
    <div class="account-card">
        <div class="acc-item"><i class="fas fa-id-card"></i> CONTA:<br><b id="conta-id">---</b></div>
        <div class="acc-item"><i class="fas fa-wallet"></i> SALDO:<br><b id="saldo-atual" style="color:var(--green)">R$ 0,00</b></div>
        <div class="acc-item"><i class="fas fa-calendar-day"></i> HOJE:<br><b id="resultado-dia">R$ 0,00</b></div>
        <div class="acc-item"><i class="fas fa-hand-holding-usd"></i> EM ABERTO:<br><b id="aberto-total">R$ 0,00</b></div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>MINI ÍNDICE (WIN)</h3>
            <h1 id="preco-WIN" style="font-size: 2.5em; margin: 10px 0;">---</h1>
            <div class="boleta">
                <input type="number" id="lotes-WIN" class="input-lotes" value="1">
                <button class="btn-trade btn-buy" onclick="enviarOrdem('WIN', 'BUY')">COMPRAR</button>
                <button class="btn-trade btn-sell" onclick="enviarOrdem('WIN', 'SELL')">VENDER</button>
            </div>
            <div id="sugestao-WIN" class="sugestao-box">
                <div id="txt-sugestao-WIN" style="font-weight:bold;">---</div>
                <button id="btn-sug-WIN" class="btn-trade" style="width:100%; margin-top:5px; background:white;">EXECUTAR AGORA</button>
            </div>
        </div>

        <div class="card">
            <h3>MINI DÓLAR (WDO)</h3>
            <h1 id="preco-WDO" style="font-size: 2.5em; margin: 10px 0;">---</h1>
            <div class="boleta">
                <input type="number" id="lotes-WDO" class="input-lotes" value="1">
                <button class="btn-trade btn-buy" onclick="enviarOrdem('WDO', 'BUY')">COMPRAR</button>
                <button class="btn-trade btn-sell" onclick="enviarOrdem('WDO', 'SELL')">VENDER</button>
            </div>
            <div id="sugestao-WDO" class="sugestao-box">
                <div id="txt-sugestao-WDO" style="font-weight:bold;">---</div>
                <button id="btn-sug-WDO" class="btn-trade" style="width:100%; margin-top:5px; background:white;">EXECUTAR AGORA</button>
            </div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3>CURVA DE PATRIMÔNIO</h3>
            <div class="chart-wrap"><canvas id="perfChart"></canvas></div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3>JURITY ANALISTA (GEMINI IA)</h3>
            <div id="chat-window" class="chat-win"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="user-input" style="flex-grow:1; background:#0b0e11; border:1px solid #444; color:white; padding:12px; border-radius:8px;" placeholder="Digite e aperte Enter para falar com a IA...">
                <button onclick="enviarPergunta()" style="background:var(--yellow); border:none; padding:10px 25px; border-radius:8px; font-weight:bold; cursor:pointer;">ENVIAR</button>
            </div>
        </div>
    </div>

    <div class="card" style="margin-top:20px; width:100%; box-sizing:border-box;">
        <h3>ORDENS EM ABERTO</h3>
        <table>
            <thead><tr><th>ATIVO</th><th>LADO</th><th>SL</th><th>TP</th><th>LUCRO</th><th>AÇÃO</th></tr></thead>
            <tbody id="tabela-ordens"></tbody>
        </table>
    </div>
</div>

<script>
    const ctx = document.getElementById('perfChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Saldo R$', data: [], borderColor: '#f0b90b', tension: 0.3, fill: false }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#222' } } } }
    });

    const beep = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

    // Função Enter no Chat
    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') enviarPergunta();
    });

    async function atualizar() {
        ['WIN', 'WDO'].forEach(async (at) => {
            const r = await fetch('/get_signal?ativo=' + at);
            const d = await r.json();
            document.getElementById('preco-' + at).innerText = d.preco;
            const box = document.getElementById('sugestao-' + at);
            if(d.sugestao !== "NEUTRO") {
                if(box.style.display !== 'block') beep.play();
                box.style.display = 'block';
                document.getElementById('txt-sugestao-' + at).innerText = "OPORTUNIDADE: " + d.sugestao;
                document.getElementById('btn-sug-' + at).onclick = () => enviarOrdem(at, d.sugestao === "COMPRA" ? "BUY" : "SELL");
            } else { box.style.display = 'none'; }
        });

        const rFin = await fetch('/get_financeiro');
        const fin = await rFin.json();
        
        document.getElementById('conta-id').innerText = fin.conta;
        document.getElementById('saldo-atual').innerText = "R$ " + fin.saldo_atual.toLocaleString('pt-BR');
        
        const resDiaEl = document.getElementById('resultado-dia');
        resDiaEl.innerText = "R$ " + fin.resultado_dia.toLocaleString('pt-BR');
        resDiaEl.style.color = fin.resultado_dia >= 0 ? 'var(--green)' : 'var(--red)';

        let somaAberto = fin.posicoes.reduce((acc, p) => acc + p.lucro, 0);
        const abertoEl = document.getElementById('aberto-total');
        abertoEl.innerText = "R$ " + somaAberto.toLocaleString('pt-BR');
        abertoEl.style.color = somaAberto >= 0 ? 'var(--green)' : 'var(--red)';

        let html = '';
        fin.posicoes.forEach(p => {
            html += `<tr><td>${p.ativo}</td><td style="color:${p.tipo=='COMPRA'?'#0f8':'#f44'}">${p.tipo}</td><td>${p.sl}</td><td>${p.tp}</td><td>R$ ${p.lucro}</td><td><button onclick="fechar(${p.ticket})">X</button></td></tr>`;
        });
        document.getElementById('tabela-ordens').innerHTML = html || '<tr><td colspan="6" style="text-align:center">Nenhuma ordem ativa</td></tr>';
    }

    async function enviarPergunta() {
        const input = document.getElementById('user-input');
        const chatWin = document.getElementById('chat-window');
        if(!input.value) return;
        chatWin.innerHTML += `<p style="color:var(--yellow)"><b>Você:</b> ${input.value}</p>`;
        const r = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ mensagem: input.value }) });
        const d = await r.json();
        chatWin.innerHTML += `<p style="color:var(--green); background:#161a1e; padding:10px; border-radius:8px;"><b>Jurity:</b> ${d.resposta}</p>`;
        win.scrollTop = win.scrollHeight;
        input.value = '';
    }

    async function updateChart() {
        const res = await fetch('/get_historico');
        const hist = await res.json();
        chart.data.labels = hist.map(h => h.x);
        chart.data.datasets[0].data = hist.map(h => h.y);
        chart.update();
    }

    async function enviarOrdem(ativo, tipo) {
        const lotes = document.getElementById('lotes-' + ativo).value;
        await fetch('/order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ativo, tipo, lotes }) });
        alert("Comando de " + tipo + " enviado!");
    }

    setInterval(atualizar, 2000);
    setInterval(updateChart, 5000);
</script>
</body>
</html>
