<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA Pro - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .status-bar { width: 800px; background: #2b3139; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 12px; border: 1px solid #444; margin-bottom: 10px; }
        .card { background: #1e2329; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; width: 340px; }
        .price { font-size: 32px; color: #f0b90b; font-weight: bold; }
        .rsi-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; background: #333; margin-left: 10px; }
        .btn-buy { background: #02c076; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 48%; border-radius: 4px; }
        .btn-sell { background: #cf304a; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 48%; border-radius: 4px; }
        .btn-panic { background: #ff3b3b; color: white; border: none; padding: 15px; width: 800px; margin: 10px 0; font-weight: bold; cursor: pointer; border-radius: 8px; }
        table { width: 800px; border-collapse: collapse; background: #1e2329; font-size: 12px; }
        th { background: #333; color: #848e9c; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        .perf-row { width: 800px; display: flex; gap: 15px; margin-top: 15px; }
        .chart-box { background: #1e2329; padding: 15px; border-radius: 8px; flex: 2; border: 1px solid #333; }
        .hist-box { background: #1e2329; padding: 15px; border-radius: 8px; flex: 1; border: 1px solid #333; max-height: 250px; overflow-y: auto; }
        #chat-win { height: 100px; overflow-y: auto; background: #000; width: 780px; padding: 10px; margin-top: 10px; border-radius: 8px; font-size: 12px; }
        .gain { color: #02c076; } .loss { color: #cf304a; }
    </style>
</head>
<body>
    <h2 style="color:#f0b90b">JURITY IA PRO 🦅</h2>
    <div class="status-bar">
        <span>CONTA: <b id="fin-conta">...</b></span>
        <span>PATRIMÔNIO: <b id="fin-saldo">R$ 0,00</b></span>
        <span>HOJE: <b id="fin-dia">R$ 0,00</b></span>
        <span>ABERTO: <b id="fin-aberto">R$ 0,00</b></span>
    </div>
    <div style="display:flex; gap:15px;">
        <div class="card">
            <h3>WIN <span id="rsi-win" class="rsi-badge">--</span></h3>
            <div id="p-win" class="price">0</div>
            <div style="margin: 10px 0;">LOTES: <input type="number" id="lote-win" value="1" style="width:40px"></div>
            <button class="btn-buy" onclick="ordem('WIN','BUY')">COMPRA</button>
            <button class="btn-sell" onclick="ordem('WIN','SELL')">VENDA</button>
        </div>
        <div class="card">
            <h3>WDO <span id="rsi-wdo" class="rsi-badge">--</span></h3>
            <div id="p-wdo" class="price">0</div>
            <div style="margin: 10px 0;">LOTES: <input type="number" id="lote-wdo" value="1" style="width:40px"></div>
            <button class="btn-buy" onclick="ordem('WDO','BUY')">COMPRA</button>
            <button class="btn-sell" onclick="ordem('WDO','SELL')">VENDA</button>
        </div>
    </div>
    <button class="btn-panic" onclick="ordem('ALL','PANIC')">🚨 ZERAR TUDO 🚨</button>
    <table>
        <thead><tr><th>ATIVO</th><th>TIPO</th><th>LOTES</th><th>ENTRADA</th><th>S.L.</th><th>T.P.</th><th>LUCRO</th></tr></thead>
        <tbody id="t-aberto"></tbody>
    </table>
    <div class="perf-row">
        <div class="chart-box"><canvas id="perfChart"></canvas></div>
        <div class="hist-box"><table style="width:100%"><tbody id="t-hist"></tbody></table></div>
    </div>
    <div id="chat-win"></div>
    <input type="text" id="msg-in" placeholder="Falar com IA..." style="width:780px; padding:12px; margin-top:5px; background:#1e2329; color:white; border:1px solid #444; border-radius: 8px;">
    <script>
        const ctx = document.getElementById('perfChart').getContext('2d');
        let chart = new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ label: 'Patrimônio', data: [], borderColor: '#f0b90b', fill: true, backgroundColor: 'rgba(240,185,11,0.1)', tension: 0.3 }] }, options: { scales: { y: { grid: { color: '#333' } }, x: { display: false } } } });
        async function ordem(ativo, tipo) { const lotes = document.getElementById(`lote-${ativo.toLowerCase()}`).value; await fetch('/set_order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ativo, tipo, lotes})}); }
        async function update() {
            try {
                const r = await fetch(`/get_signal?ativo=WIN`); const d = await r.json();
                document.getElementById('p-win').innerText = d.preco;
                document.getElementById('rsi-win').innerText = d.rsi;
                document.getElementById('fin-saldo').innerText = `R$ ${d.fin.saldo_atual.toFixed(2)}`;
                document.getElementById('fin-dia').innerText = `R$ ${d.fin.resultado_dia.toFixed(2)}`;
                document.getElementById('fin-aberto').innerText = `R$ ${d.fin.em_aberto.toFixed(2)}`;
                document.getElementById('t-aberto').innerHTML = d.posicoes.map(p => `<tr><td>${p.symbol}</td><td class="${p.type==0?'gain':'loss'}">${p.type==0?'COMPRA':'VENDA'}</td><td>${p.volume}</td><td>${p.price_open}</td><td>${p.sl}</td><td>${p.tp}</td><td class="${p.profit>=0?'gain':'loss'}">R$ ${p.profit.toFixed(2)}</td></tr>`).join('');
                chart.data.labels = d.historico.map(h => h.horario); chart.data.datasets[0].data = d.historico.map(h => h.acumulado); chart.update();
                document.getElementById('t-hist').innerHTML = d.historico.slice().reverse().map(h => `<tr><td>${h.horario}</td><td>R$ ${h.acumulado.toFixed(2)}</td></tr>`).join('');
                const r2 = await fetch(`/get_signal?ativo=WDO`); const d2 = await r2.json();
                document.getElementById('p-wdo').innerText = d2.preco; document.getElementById('rsi-wdo').innerText = d2.rsi;
            } catch(e) {}
        }
        document.getElementById('msg-in').addEventListener('keypress', async (e) => { if(e.key === 'Enter') { const m = e.target.value; e.target.value = ''; document.getElementById('chat-win').innerHTML += `<p><b>Tu:</b> ${m}</p>`; const res = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mensagem:m})}); const data = await res.json(); document.getElementById('chat-win').innerHTML += `<p style="color:#00ff88"><b>IA:</b> ${data.resposta}</p>`; } });
        setInterval(update, 2000);
    </script>
</body>
</html>
