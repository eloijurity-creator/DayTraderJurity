<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JURITY IA - DASHBOARD</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e2329; padding: 20px; border-radius: 10px; width: 300px; text-align: center; border: 1px solid #333; }
        .price { font-size: 38px; color: #f0b90b; font-family: monospace; }
        .btn-buy { background: #00ff88; color: black; border: none; padding: 10px; font-weight: bold; cursor: pointer; width: 48%; }
        .btn-sell { background: #ff3b3b; color: white; border: none; padding: 10px; font-weight: bold; cursor: pointer; width: 48%; }
        #chat { height: 150px; overflow-y: auto; background: #000; padding: 10px; margin: 10px 0; width: 600px; border: 1px solid #444; }
        .gain { color: #00ff88; } .loss { color: #ff3b3b; }
    </style>
</head>
<body>
    <h1>JURITY IA 🦅</h1>
    <div style="display:flex; gap:20px;">
        <div class="card">
            <h3>WIN (ÍNDICE)</h3>
            <div id="p-win" class="price">000.000</div>
            <div id="s-win">Aguardando...</div>
            <div style="margin-top:15px; display:flex; justify-content: space-between;">
                <button class="btn-buy" onclick="enviarOrdem('WIN', 'BUY')">COMPRAR</button>
                <button class="btn-sell" onclick="enviarOrdem('WIN', 'SELL')">VENDER</button>
            </div>
        </div>
        <div class="card">
            <h3>WDO (DÓLAR)</h3>
            <div id="p-wdo" class="price">0.000,00</div>
            <div id="s-wdo">Aguardando...</div>
            <div style="margin-top:15px; display:flex; justify-content: space-between;">
                <button class="btn-buy" onclick="enviarOrdem('WDO', 'BUY')">COMPRAR</button>
                <button class="btn-sell" onclick="enviarOrdem('WDO', 'SELL')">VENDER</button>
            </div>
        </div>
    </div>

    <div id="chat"></div>
    <input type="text" id="msg-in" placeholder="Dúvida? Enter" style="width:620px; padding:10px; background:#1e2329; color:white; border:1px solid #444;">

    <table border="1" style="width:620px; margin-top:20px; border-collapse: collapse;">
        <thead><tr><th>HORA</th><th>ATIVO</th><th>ENTRADA</th><th>TENDÊNCIA</th><th>RESULTADO 15M</th></tr></thead>
        <tbody id="l-body"></tbody>
    </table>

    <script>
        async function enviarOrdem(ativo, tipo) {
            const preco = parseFloat(document.getElementById(`p-${ativo.toLowerCase()}`).innerText.replace('.',''));
            const offset = ativo === 'WIN' ? 150 : 5.0;
            const payload = {
                ativo: ativo, tipo: tipo, preco: preco,
                sl: tipo === 'BUY' ? preco - offset : preco + offset,
                tp: tipo === 'BUY' ? preco + offset : preco - offset,
                lotes: 1
            };
            const res = await fetch('/set_order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
            alert("Ordem enviada para a fila do MT5!");
        }

        async function update() {
            for (let a of ['WIN', 'WDO']) {
                const r = await fetch(`/get_signal?ativo=${a}`);
                const d = await r.json();
                document.getElementById(`p-${a.toLowerCase()}`).innerText = d.preco;
                document.getElementById(`s-${a.toLowerCase()}`).innerText = `${d.sinal} | RSI: ${d.rsi}`;
            }
            const rl = await fetch('/get_log');
            const logs = await rl.json();
            document.getElementById('l-body').innerHTML = logs.map(l => `
                <tr><td>${l.horario}</td><td>${l.ativo}</td><td>${l.preco}</td><td>${l.tendencia}</td><td class="${l.resultado.includes('GAIN')?'gain':'loss'}">${l.resultado}</td></tr>
            `).join('');
        }

        document.getElementById('msg-in').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const val = e.target.value; e.target.value = '';
                document.getElementById('chat').innerHTML += `<p style="color:#f0b90b">Você: ${val}</p>`;
                const res = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mensagem:val})});
                const d = await res.json();
                document.getElementById('chat').innerHTML += `<p style="color:#00ff88">Jurity: ${d.resposta}</p>`;
            }
        });

        setInterval(update, 2000);
    </script>
</body>
</html>
