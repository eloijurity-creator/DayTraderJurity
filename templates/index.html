<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurity IA - Clone</title>
    <style>
        body <div style="text-align: center; padding: 20px; background: #0b0e11;">
    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Jurity IA" style="max-width: 300px; border-radius: 10px;">
    <h1 style="color: #ffffff; font-family: sans-serif; margin-top: 10px;">JURITY IA</h1>
    <p style="color: #888;">Assistente Senior de Day Trade | B3</p>
</div>{ background: #0b0e11; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e2329; border-radius: 15px; padding: 25px; width: 350px; border: 1px solid #333; text-align: center; }
        .status { color: #00ff88; font-weight: bold; margin-bottom: 20px; }
        .signal-box { background: #2b3139; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #f0b90b; }
        .buy { color: #00ff88; } .sell { color: #ff3b3b; }
        button { background: #f0b90b; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #d9a508; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Jurity IA 🦅</h2>
        <div class="status">● CONECTADO À B3</div>
        
        <div id="signal-area">
            <div class="signal-box">
                <p>Aguardando Próxima Oportunidade...</p>
            </div>
        </div>

        <button onclick="gerarSinal()">ANALISAR MERCADO AGORA</button>
    </div>
<div class="card" style="margin-top: 20px; width: 350px;">
    <h3>ASSISTENTE Jurity IA 🤖</h3>
    <div id="chat-window" style="height: 200px; overflow-y: auto; background: #0b0e11; padding: 10px; border-radius: 5px; text-align: left; font-size: 14px;">
        <p style="color: #888;">Pergunte algo sobre o mercado...</p>
    </div>
    <input type="text" id="user-input" placeholder="Ex: Tendência do WIN?" style="width: 80%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none;">
    <button onclick="enviarPergunta()" style="width: 15%; padding: 10px;">></button>
</div>

<script>
async function enviarPergunta() {
    const input = document.getElementById('user-input');
    const chatWin = document.getElementById('chat-window');
    const pergunta = input.value;
    if(!pergunta) return;

    chatWin.innerHTML += `<p style="color: #f0b90b;"><b>Você:</b> ${pergunta}</p>`;
    input.value = '';

    const response = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ mensagem: pergunta })
    });
    const data = await response.json();
    chatWin.innerHTML += `<p style="color: #00ff88;"><b>Jurity:</b> ${data.resposta}</p>`;
    chatWin.scrollTop = chatWin.scrollHeight;
}
</script>
    <script>
        async function gerarSinal() {
    const response = await fetch('/get_signal');
    const data = await response.json();
    
    document.getElementById('signal-area').innerHTML = `
        <div class="signal-box" style="border-left: 5px solid ${data.cor}">
            <h3 style="color: ${data.cor}">${data.sinal}</h3>
            <p>Ativo: <strong>${data.ativo}</strong></p>
            <p>Preço: ${data.preco}</p>
            <p>RSI: ${data.rsi}</p>
        </div>
    `;
}
    </script>
</body>
</html>
