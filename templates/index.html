<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA - Painel de Controle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --border: #333; --green: #00ff88; --red: #ff4d4d; --yellow: #f0b90b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        
        .main-container { max-width: 1200px; margin: 0 auto; }
        
        .header-section { text-align: center; margin-bottom: 20px; }
        .logo { width: 80px; margin-bottom: 10px; }
        
        /* Card de Conta abaixo da Logo */
        .account-card { background: var(--card); border: 1px solid var(--yellow); border-radius: 10px; padding: 10px 20px; display: inline-flex; gap: 20px; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; position: relative; }

        /* Estilo da Boleta no Card */
        .boleta { margin-top: 15px; display: flex; gap: 10px; align-items: center; justify-content: center; }
        .input-lotes { width: 60px; background: #0b0e11; border: 1px solid #555; color: white; padding: 5px; border-radius: 5px; text-align: center; }
        .btn-trade { border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-buy { background: var(--green); color: black; }
        .btn-sell { background: var(--red); color: white; }

        /* Alerta de Sugestão Piscante */
        .sugestao-box { background: rgba(240, 185, 11, 0.1); border: 2px solid var(--yellow); border-radius: 10px; padding: 10px; margin-top: 15px; display: none; text-align: center; animation: pulse-gold 1.5s infinite; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0px var(--yellow); } 50% { box-shadow: 0 0 15px var(--yellow); } 100% { box-shadow: 0 0 0px var(--yellow); } }

        /* Fix Gráfico */
        .chart-container { height: 250px; width: 100%; position: relative; margin-top: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #888; border-bottom: 1px solid #333; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <img src="/static/logo_jurity.png" class="logo" alt="Jurity IA">
        <br>
        <div class="account-card">
            <span><i class="fas fa-user"></i> CONTA: <b id="conta-id">---</b></span>
            <span><i class="fas fa-wallet"></i> SALDO: <b id="saldo-atual" style="color:var(--green)">R$ 0,00</b></span>
        </div>
    </div>

    <div class="grid">
        <div class="card" id="card-WIN">
            <h3>MINI ÍNDICE (WIN)</h3>
            <h1 id="preco-WIN">---</h1>
            
            <div class="boleta">
                <input type="number" id="lotes-WIN" class="input-lotes" value="1" min="1">
                <button class="btn-trade btn-buy" onclick="enviarOrdem('WIN', 'BUY')">COMPRAR</button>
                <button class="btn-trade btn-sell" onclick="enviarOrdem('WIN', 'SELL')">VENDER</button>
            </div>

            <div id="sugestao-WIN" class="sugestao-box">
                <small style="color:var(--yellow)">SUGESTÃO JURITY IA</small>
                <div id="txt-sugestao-WIN" style="font-weight:bold; margin-bottom:5px;">---</div>
                <button id="btn-sugestao-WIN" class="btn-trade" style="width:100%">EXECUTAR AGORA</button>
            </div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3>DESEMPENHO EM TEMPO REAL</h3>
            <div class="chart-container">
                <canvas id="perfChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card" style="margin-top:20px;">
        <h3>ORDENS EM ABERTO</h3>
        <table>
            <thead>
                <tr><th>ATIVO</th><th>LADO</th><th>SL</th><th>TP</th><th>DIST. SL</th><th>LUCRO</th><th>AÇÃO</th></tr>
            </thead>
            <tbody id="tabela-ordens"></tbody>
        </table>
    </div>
</div>

<script>
    const ctx = document.getElementById('perfChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Patrimônio (R$)', data: [], borderColor: '#f0b90b', tension: 0.1, fill: false }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#222' } } } }
    });

    async function atualizar() {
        // Atualiza WIN
        const rWin = await fetch('/get_signal?ativo=WIN');
        const dWin = await rWin.json();
        document.getElementById('preco-WIN').innerText = dWin.preco;
        
        // Lógica da Sugestão IA
        const box = document.getElementById('sugestao-WIN');
        if(dWin.sugestao !== "NEUTRO") {
            box.style.display = 'block';
            document.getElementById('txt-sugestao-WIN').innerText = "OPORTUNIDADE DE " + dWin.sugestao;
            const btn = document.getElementById('btn-sugestao-WIN');
            btn.className = dWin.sugestao === "COMPRA" ? "btn-trade btn-buy" : "btn-trade btn-sell";
            btn.onclick = () => enviarOrdem('WIN', dWin.sugestao === "COMPRA" ? "BUY" : "SELL");
        } else { box.style.display = 'none'; }

        // Atualiza Financeiro e Tabela
        const rFin = await fetch('/get_financeiro');
        const fin = await rFin.json();
        document.getElementById('conta-id').innerText = fin.conta;
        document.getElementById('saldo-atual').innerText = "R$ " + fin.saldo_atual.toLocaleString('pt-BR');

        let html = '';
        fin.posicoes.forEach(p => {
            html += `<tr><td>${p.ativo}</td><td>${p.tipo}</td><td>${p.sl}</td><td>${p.tp}</td><td>${p.dist_sl_pontos}</td><td>R$ ${p.lucro}</td><td><button onclick="fecharIndividual(${p.ticket})">X</button></td></tr>`;
        });
        document.getElementById('tabela-ordens').innerHTML = html || '<tr><td colspan="7">Nenhuma ordem ativa</td></tr>';
    }

    async function updateChart() {
        const res = await fetch('/get_historico');
        const hist = await res.json();
        chart.data.labels = hist.map(h => h.x);
        chart.data.datasets[0].data = hist.map(h => h.y);
        chart.update();
    }

    async function enviarOrdem(ativo, tipo) {
        const lotes = document.getElementById('lotes-' + ativo).value;
        await fetch('/order', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ativo, tipo, lotes })
        });
        alert("Ordem de " + tipo + " enviada!");
    }

    setInterval(atualizar, 2000);
    setInterval(updateChart, 5000);
</script>
</body>
</html>
