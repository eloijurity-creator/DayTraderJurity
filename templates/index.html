<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA - Trading Dashboard</title>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .status-bar { width: 780px; background: #2b3139; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 12px; border: 1px solid #444; }
        .card { background: #1e2329; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; width: 320px; }
        .price-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 10px 0; }
        .price { font-size: 32px; color: #f0b90b; font-weight: bold; font-family: monospace; }
        .rsi-badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 14px; background: #333; }
        .btn-buy { background: #02c076; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 48%; border-radius: 4px; color: white; }
        .btn-sell { background: #cf304a; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 48%; border-radius: 4px; }
        .btn-panic { background: #ff3b3b; color: white; border: none; padding: 15px; width: 780px; margin-top: 10px; font-weight: bold; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        table { width: 780px; border-collapse: collapse; margin-top: 15px; font-size: 12px; background: #1e2329; }
        th { background: #333; color: #848e9c; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #333; }
        #chat-win { height: 120px; overflow-y: auto; background: #000; width: 760px; padding: 10px; margin-top: 10px; border-radius: 8px; font-size: 12px; border: 1px solid #333; }
        .gain { color: #02c076; } .loss { color: #cf304a; }
        .oversold { color: #02c076; border: 1px solid #02c076; }
        .overbought { color: #cf304a; border: 1px solid #cf304a; }
    </style>
</head>
<body>
    <h2 style="color:#f0b90b; margin-bottom: 5px;">JURITY IA 🦅</h2>
    
    <div class="status-bar">
        <span>CONTA: <b id="fin-conta">...</b></span>
        <span>PATRIMÔNIO: <b id="fin-saldo" style="color:#fff">R$ 0,00</b></span>
        <span>HOJE: <b id="fin-dia">R$ 0,00</b></span>
        <span>ABERTO: <b id="fin-aberto">R$ 0,00</b></span>
    </div>

    <div style="display:flex; gap:15px; margin-bottom: 10px;">
        <div class="card">
            <h3>MINI ÍNDICE</h3>
            <div class="price-row">
                <div id="p-win" class="price">0</div>
                <div id="rsi-win" class="rsi-badge">RSI: --</div>
            </div>
            <div style="margin-bottom:10px; font-size: 12px;">LOTES: <input type="number" id="lote-win" value="1" style="width:40px; background:#000; color:white; border:1px solid #444;"></div>
            <button class="btn-buy" onclick="ordem('WIN','BUY')">COMPRAR</button>
            <button class="btn-sell" onclick="ordem('WIN','SELL')">VENDER</button>
        </div>
        <div class="card">
            <h3>MINI DÓLAR</h3>
            <div class="price-row">
                <div id="p-wdo" class="price">0</div>
                <div id="rsi-wdo" class="rsi-badge">RSI: --</div>
            </div>
            <div style="margin-bottom:10px; font-size: 12px;">LOTES: <input type="number" id="lote-wdo" value="1" style="width:40px; background:#000; color:white; border:1px solid #444;"></div>
            <button class="btn-buy" onclick="ordem('WDO','BUY')">COMPRAR</button>
            <button class="btn-sell" onclick="ordem('WDO','SELL')">VENDER</button>
        </div>
    </div>

    <button class="btn-panic" onclick="ordem('ALL','PANIC')">🚨 ZERAR TODAS AS POSIÇÕES 🚨</button>

    <table>
        <thead><tr><th>ATIVO</th><th>TIPO</th><th>LOTES</th><th>ENTRADA</th><th>S.L.</th><th>T.P.</th><th>LUCRO</th></tr></thead>
        <tbody id="t-aberto"></tbody>
    </table>

    <div id="chat-win"></div>
    <input type="text" id="msg-in" placeholder="Perguntar à Jurity IA..." style="width:760px; padding:12px; margin-top:5px; background:#1e2329; color:white; border:1px solid #444; border-radius: 8px;">

    <script>
        async function ordem(ativo, tipo) {
            const lotes = parseInt(document.getElementById(`lote-${ativo.toLowerCase()}`)?.value || 1);
            await fetch('/set_order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ativo, tipo, lotes})});
        }

        function updateRSIStyle(el, val) {
            el.innerText = `RSI: ${val}`;
            el.className = 'rsi-badge ' + (val <= 30 ? 'oversold' : val >= 70 ? 'overbought' : '');
        }

        async function update() {
            try {
                const r = await fetch(`/get_signal?ativo=WIN`);
                const d = await r.json();
                document.getElementById('p-win').innerText = d.preco;
                updateRSIStyle(document.getElementById('rsi-win'), d.rsi);
                
                document.getElementById('fin-conta').innerText = d.fin.conta;
                document.getElementById('fin-saldo').innerText = `R$ ${d.fin.saldo_atual.toLocaleString('pt-BR')}`;
                document.getElementById('fin-dia').innerText = `R$ ${d.fin.resultado_dia.toFixed(2)}`;
                document.getElementById('fin-dia').className = d.fin.resultado_dia >= 0 ? 'gain' : 'loss';
                document.getElementById('fin-aberto').innerText = `R$ ${d.fin.em_aberto.toFixed(2)}`;
                document.getElementById('fin-aberto').className = d.fin.em_aberto >= 0 ? 'gain' : 'loss';
                
                document.getElementById('t-aberto').innerHTML = d.posicoes.map(p => `
                    <tr><td><b>${p.symbol}</b></td><td class="${p.type == 0 ? 'gain' : 'loss'}">${p.type == 0 ? 'COMPRA' : 'VENDA'}</td>
                    <td>${p.volume}</td><td>${p.price_open}</td><td>${p.sl || '-'}</td><td>${p.tp || '-'}</td>
                    <td class="${p.profit >= 0 ? 'gain' : 'loss'}">R$ ${p.profit.toFixed(2)}</td></tr>
                `).join('');

                const r2 = await fetch(`/get_signal?ativo=WDO`);
                const d2 = await r2.json();
                document.getElementById('p-wdo').innerText = d2.preco;
                updateRSIStyle(document.getElementById('rsi-wdo'), d2.rsi);
            } catch(e) {}
        }

        document.getElementById('msg-in').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const val = e.target.value; e.target.value = '';
                const win = document.getElementById('chat-win');
                win.innerHTML += `<p><b>Trader:</b> ${val}</p>`;
                const res = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mensagem:val})});
                const data = await res.json();
                win.innerHTML += `<p style="color:#00ff88"><b>Jurity IA:</b> ${data.resposta}</p>`;
                win.scrollTop = win.scrollHeight;
            }
        });
        setInterval(update, 1500);
    </script>
</body>
</html>
