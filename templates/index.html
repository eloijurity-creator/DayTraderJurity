<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>IA TRADER SENTINELA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0b0f19; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .panel { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .chat-area { height: 150px; overflow-y: auto; background: #0d1117; border-radius: 5px; padding: 10px; color: #8b949e; font-size: 0.85rem; }
        .alert-row { background: rgba(255, 0, 0, 0.2) !important; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div class="container-fluid p-4">
    <div class="row">
        <div class="col-md-8">
            <div class="panel">
                <div class="d-flex justify-content-between">
                    <h5>Gráfico de Equity (Performance)</h5>
                    <button onclick="ativarVoz()" class="btn btn-outline-warning btn-sm">🎤 Comando de Voz</button>
                </div>
                <canvas id="chart" style="height: 250px;"></canvas>
            </div>
            <div class="panel">
                <h5>Ordens Abertas</h5>
                <table class="table table-dark">
                    <thead><tr><th>Ativo</th><th>Lado</th><th>SL Pontos</th><th>Lucro</th></tr></thead>
                    <tbody id="tabela"></tbody>
                </table>
            </div>
        </div>
        <div class="col-md-4">
            <div class="panel text-center">
                <h6>LUCRO ATUAL</h6>
                <h1 id="lucro" class="text-success">$ 0.00</h1>
                <button onclick="panic()" class="btn btn-danger w-100 mt-2">PÂNICO: FECHAR TUDO</button>
            </div>
            <div class="panel">
                <h6>IA SENTINELA (Chat & Voz)</h6>
                <div id="chat" class="chat-area mb-2"></div>
                <div id="status-ia" class="badge bg-secondary w-100">MT5 Status</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Gráfico
    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ label: 'Equity', data: [], borderColor: '#00ff00', tension: 0.4 }] } });

    // Voz (Saída)
    function falar(texto) {
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = 'pt-PT';
        window.speechSynthesis.speak(msg);
    }

    // Comando de Voz (Entrada)
    function ativarVoz() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'pt-PT';
        rec.onresult = (e) => {
            const cmd = e.results[0][0].transcript.toLowerCase();
            if(cmd.includes("fechar")) panic();
            if(cmd.includes("ajuda")) falar("Estou a monitorizar o mercado para si.");
        };
        rec.start();
    }

    async function panic() { await fetch('/api/panic', {method: 'POST'}); falar("Ordem de pânico executada. Todas as posições fechadas."); }

    async function atualizar() {
        const res = await fetch('/api/dados');
        const d = await res.json();
        
        document.getElementById('lucro').innerText = `$ ${d.lucro_total}`;
        document.getElementById('status-ia').innerText = d.ia_ativa ? "IA HABILITADA" : "IA DESABILITADA NO TERMINAL";
        document.getElementById('status-ia').className = d.ia_ativa ? "badge bg-success w-100" : "badge bg-danger w-100";

        // Tabela e Alertas
        let html = '';
        d.ordens.forEach(o => {
            html += `<tr class="${o.alerta ? 'alert-row' : ''}"><td>${o.ativo}</td><td>${o.tipo}</td><td>${o.dist_sl}</td><td>${o.lucro}</td></tr>`;
        });
        document.getElementById('tabela').innerHTML = html;

        // Gráfico
        chart.data.labels.push(new Date().toLocaleTimeString());
        chart.data.datasets[0].data.push(d.lucro_total);
        if(chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
        chart.update();
    }

    async function sentinela() {
        const res = await fetch('/api/analise');
        const d = await res.json();
        const chat = document.getElementById('chat');
        chat.innerHTML = `<p><strong>[Sentinela]:</strong> ${d.conselho}</p>` + chat.innerHTML;
        falar(d.conselho);
    }

    setInterval(atualizar, 2000);
    setInterval(sentinela, 30000); // Analisa a cada 30 seg
</script>
</body>
</html>
