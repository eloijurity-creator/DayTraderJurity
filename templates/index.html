<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA - Operacional</title>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e2329; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; width: 290px; }
        .price { font-size: 32px; color: #f0b90b; font-weight: bold; margin: 10px 0; font-family: monospace; }
        .btn-buy { background: #00ff88; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 48%; border-radius: 4px; }
        .btn-sell { background: #ff3b3b; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 48%; border-radius: 4px; }
        .btn-panic { background: #ff3b3b; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 615px; border-radius: 8px; margin-top: 10px; box-shadow: 0 0 15px rgba(255,59,59,0.2); }
        .status-bar { width: 615px; background: #2b3139; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; display: flex; justify-content: space-between; border: 1px solid #444; }
        input[type="number"] { background: #0b0e11; border: 1px solid #444; color: #00ff88; padding: 5px; width: 60px; border-radius: 4px; text-align: center; font-weight: bold; }
        .gain { color: #00ff88; } .loss { color: #ff3b3b; }
        #chat-box { height: 100px; overflow-y: auto; background: #000; width: 615px; padding: 10px; margin-top: 15px; border: 1px solid #333; font-size: 12px; }
    </style>
</head>
<body>
    <h2 style="color:#f0b90b">JURITY IA 🦅</h2>
    
    <div class="status-bar">
        <span>CONTA: <b id="fin-conta" style="color:#fff">...</b></span>
        <span>HOJE: <b id="fin-hoje">R$ 0,00</b></span>
        <span>ABERTO: <b id="fin-aberto" style="color:#f0b90b">R$ 0,00</b></span>
    </div>

    <div style="display:flex; gap:15px; width:615px;">
        <div class="card">
            <h3>MINI ÍNDICE</h3>
            <div id="p-win" class="price">0</div>
            <div style="margin-bottom:12px; font-size: 12px; color: #848e9c;">
                LOTES: <input type="number" id="lote-win" value="1" min="1">
            </div>
            <div style="display:flex; justify-content: space-between;">
                <button class="btn-buy" onclick="enviar('WIN','BUY')">COMPRA</button>
                <button class="btn-sell" onclick="enviar('WIN','SELL')">VENDA</button>
            </div>
        </div>
        <div class="card">
            <h3>MINI DÓLAR</h3>
            <div id="p-wdo" class="price">0</div>
            <div style="margin-bottom:12px; font-size: 12px; color: #848e9c;">
                LOTES: <input type="number" id="lote-wdo" value="1" min="1">
            </div>
            <div style="display:flex; justify-content: space-between;">
                <button class="btn-buy" onclick="enviar('WDO','BUY')">COMPRA</button>
                <button class="btn-sell" onclick="enviar('WDO','SELL')">VENDA</button>
            </div>
        </div>
    </div>

    <button class="btn-panic" onclick="enviar('ALL','PANIC')">🚨 ZERAR TODAS AS POSIÇÕES 🚨</button>

    <div id="chat-box"></div>

    <script>
        async function enviar(ativo, tipo) {
            const lotes = parseInt(document.getElementById(`lote-${ativo.toLowerCase()}`)?.value || 1);
            await fetch('/set_order', {
                method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({ativo, tipo, lotes})
            });
            console.log(`Comando ${tipo} enviado.`);
        }

        async function update() {
            const ativos = ['WIN', 'WDO'];
            for (let a of ativos) {
                const r = await fetch(`/get_signal?ativo=${a}`);
                const d = await r.json();
                document.getElementById(`p-${a.toLowerCase()}`).innerText = d.preco;
                document.getElementById('fin-conta').innerText = d.fin.conta;
                document.getElementById('fin-hoje').innerText = `R$ ${d.fin.lucro_hoje.toFixed(2)}`;
                document.getElementById('fin-hoje').className = d.fin.lucro_hoje >= 0 ? 'gain' : 'loss';
                document.getElementById('fin-aberto').innerText = `R$ ${d.fin.em_aberto.toFixed(2)}`;
            }
        }
        setInterval(update, 2000);
    </script>
</body>
</html>
