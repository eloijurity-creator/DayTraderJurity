<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA 2.5 Flash</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .status-bar { width: 900px; background: #1e2329; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; border: 1px solid #333; margin-bottom: 15px; }
        .container { display: flex; gap: 20px; width: 900px; }
        .card { background: #1e2329; padding: 20px; border-radius: 12px; border: 1px solid #333; flex: 1; text-align: center; }
        .price { font-size: 38px; color: #f0b90b; font-weight: bold; margin: 10px 0; }
        .btn-ia { display: none; background: gold; color: black; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {opacity: 1} 50% {opacity: 0.7} 100% {opacity: 1} }
        .gain { color: #02c076; } .loss { color: #cf304a; }
        
        /* Seção Performance e Chat */
        .bottom-section { width: 900px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .box { background: #1e2329; border: 1px solid #333; border-radius: 8px; padding: 15px; height: 250px; }
        #chat-box { height: 180px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; }
        input { width: 95%; background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <h2 style="color:#f0b90b">🦅 JURITY IA 2.5 FLASH</h2>
    
    <div class="status-bar">
        <span>PATRIMÔNIO: <b id="f-saldo">R$ 0,00</b></span>
        <span>HOJE: <b id="f-dia">R$ 0,00</b></span>
        <span>ABERTO: <b id="f-aberto">R$ 0,00</b></span>
    </div>

    <div class="container">
        <div class="card">
            <h3>MINI ÍNDICE <span id="r-win" style="font-size:12px; opacity:0.5">RSI: --</span></h3>
            <button id="btn-ia-win" class="btn-ia" onclick="execIA('WIN')"></button>
            <div id="p-win" class="price">0</div>
            <div>TENDÊNCIA: <b id="t-win">--</b></div>
            <button style="background:#02c076; border:none; padding:10px; color:white;" onclick="ordem('WIN','BUY')">COMPRAR</button>
            <button style="background:#cf304a; border:none; padding:10px; color:white;" onclick="ordem('WIN','SELL')">VENDER</button>
        </div>
        <div class="card">
            <h3>MINI DÓLAR <span id="r-wdo" style="font-size:12px; opacity:0.5">RSI: --</span></h3>
            <button id="btn-ia-wdo" class="btn-ia" onclick="execIA('WDO')"></button>
            <div id="p-wdo" class="price">0</div>
            <div>TENDÊNCIA: <b id="t-wdo">--</b></div>
            <button style="background:#02c076; border:none; padding:10px; color:white;" onclick="ordem('WDO','BUY')">COMPRAR</button>
            <button style="background:#cf304a; border:none; padding:10px; color:white;" onclick="ordem('WDO','SELL')">VENDER</button>
        </div>
    </div>

    <div class="bottom-section">
        <div class="box"><canvas id="equityChart"></canvas></div>
        <div class="box">
            <h4>CHAT JURITY 🦅</h4>
            <div id="chat-box"></div>
            <input type="text" id="chat-in" placeholder="Dúvidas sobre o trade?">
        </div>
    </div>

    <script>
        const ctx = document.getElementById('equityChart').getContext('2d');
        let chart = new Chart(ctx, { type:'line', data:{ labels:[], datasets:[{label:'Equity', data:[], borderColor:'gold', tension:0.3}] }, options:{ maintainAspectRatio:false } });
        let gatilhos = { WIN: null, WDO: null };

        async function ordem(ativo, tipo) {
            await fetch('/set_order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ativo, tipo, lotes:1})});
        }

        function execIA(ativo) { if(gatilhos[ativo]) ordem(ativo, gatilhos[ativo].acao); }

        async function update() {
            const res = await fetch('/get_signal'); const d = await res.json();
            
            // Preços e Botões IA
            ["win", "wdo"].forEach(a => {
                document.getElementById(`p-${a}`).innerText = d[a].preco;
                document.getElementById(`r-${a}`).innerText = `RSI: ${d[a].rsi}`;
                document.getElementById(`t-${a}`).innerText = d[a].tend;
                const btn = document.getElementById(`btn-ia-${a}`);
                if(d[a].decisao) { btn.style.display = 'block'; btn.innerText = d[a].decisao.msg; gatilhos[a.toUpperCase()] = d[a].decisao; }
                else { btn.style.display = 'none'; }
            });

            // Financeiro
            document.getElementById('f-saldo').innerText = `R$ ${d.fin.saldo_atual.toFixed(2)}`;
            document.getElementById('f-dia').innerText = `R$ ${d.fin.resultado_dia.toFixed(2)}`;
            document.getElementById('f-aberto').innerText = `R$ ${d.fin.em_aberto.toFixed(2)}`;

            // Gráfico
            chart.data.labels = d.historico.map(h => h.horario);
            chart.data.datasets[0].data = d.historico.map(h => h.acumulado);
            chart.update('none');
        }

        document.getElementById('chat-in').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const input = e.target;
                const box = document.getElementById('chat-box');
                box.innerHTML += `<p><b>Você:</b> ${input.value}</p>`;
                const r = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mensagem:input.value})});
                const data = await r.json();
                box.innerHTML += `<p style="color:gold"><b>Jurity:</b> ${data.resposta}</p>`;
                input.value = ''; box.scrollTop = box.scrollHeight;
            }
        });

        setInterval(update, 1000);
    </script>
</body>
</html>
