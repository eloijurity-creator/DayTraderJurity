<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA 2.5 Flash - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .sidebar-right { width: 320px; background: #1e2329; border-left: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }

        /* Widgets */
        .status-bar { width: 100%; max-width: 900px; background: #1e2329; padding: 15px; border-radius: 8px; display: flex; justify-content: space-around; margin-bottom: 20px; border: 1px solid #333; }
        .grid-ativos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 900px; }
        .card { background: #1e2329; padding: 20px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .price { font-size: 42px; color: #f0b90b; font-weight: bold; font-family: monospace; }
        
        /* Controles de Risco */
        .risco-inputs { display: flex; gap: 10px; justify-content: center; margin: 15px 0; font-size: 12px; }
        .risco-inputs div { display: flex; flex-direction: column; }
        input { background: #0b0e11; color: gold; border: 1px solid #444; padding: 5px; border-radius: 4px; width: 60px; text-align: center; }

        /* IA Banner */
        .ia-sugestao { display: none; background: linear-gradient(90deg, #f0b90b, #b38a08); color: black; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }

        /* Tabela e Gráfico */
        .table-container { width: 100%; max-width: 900px; margin-top: 20px; background: #1e2329; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .chart-container { width: 100%; max-width: 900px; height: 200px; margin-top: 20px; background: #1e2329; border-radius: 8px; padding: 10px; }

        /* Chat */
        #chat-window { flex: 1; overflow-y: auto; font-size: 13px; margin-bottom: 10px; padding-right: 5px; }
        .chat-input { width: 100%; padding: 10px; background: #0b0e11; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .gain { color: #02c076; } .loss { color: #cf304a; }
    </style>
</head>
<body>

    <div class="main-content">
        <h2 style="color:#f0b90b; margin-top:0;">🦅 JURITY IA 2.5 FLASH <small id="f-conta" style="color:white; font-size:12px; opacity:0.6"></small></h2>
        
        <div class="status-bar">
            <span>EQUITY: <b id="f-saldo">R$ 0,00</b></span>
            <span>HOJE: <b id="f-dia">R$ 0,00</b></span>
            <span>ABERTO: <b id="f-aberto">R$ 0,00</b></span>
        </div>

        <div class="grid-ativos">
            <div class="card">
                <h3>WIN <span id="r-win" style="font-size:12px; opacity:0.5">RSI: --</span></h3>
                <div id="ia-win" class="ia-sugestao" onclick="execIA('WIN')">--</div>
                <div id="p-win" class="price">0</div>
                
                <div class="risco-inputs">
                    <div>Lotes<input type="number" id="l-win" value="1"></div>
                    <div>Stop Pts<input type="number" id="sl-win" value="150"></div>
                    <div>Gain Pts<input type="number" id="tp-win" value="300"></div>
                </div>

                <div style="display:flex; gap:10px;">
                    <button onclick="ordem('WIN','BUY')" style="flex:1; background:#02c076; border:none; padding:12px; color:white; font-weight:bold; border-radius:4px; cursor:pointer;">COMPRAR</button>
                    <button onclick="ordem('WIN','SELL')" style="flex:1; background:#cf304a; border:none; padding:12px; color:white; font-weight:bold; border-radius:4px; cursor:pointer;">VENDER</button>
                </div>
            </div>

            <div class="card">
                <h3>WDO <span id="r-wdo" style="font-size:12px; opacity:0.5">RSI: --</span></h3>
                <div id="ia-wdo" class="ia-sugestao" onclick="execIA('WDO')">--</div>
                <div id="p-wdo" class="price">0</div>

                <div class="risco-inputs">
                    <div>Lotes<input type="number" id="l-wdo" value="1"></div>
                    <div>Stop Pts<input type="number" id="sl-wdo" value="5"></div>
                    <div>Gain Pts<input type="number" id="tp-wdo" value="15"></div>
                </div>

                <div style="display:flex; gap:10px;">
                    <button onclick="ordem('WDO','BUY')" style="flex:1; background:#02c076; border:none; padding:12px; color:white; font-weight:bold; border-radius:4px; cursor:pointer;">COMPRAR</button>
                    <button onclick="ordem('WDO','SELL')" style="flex:1; background:#cf304a; border:none; padding:12px; color:white; font-weight:bold; border-radius:4px; cursor:pointer;">VENDER</button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Ativo</th><th>Tipo</th><th>Lotes</th><th>Lucro</th><th>TS Ativo?</th></tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>

        <div class="chart-container"><canvas id="equityChart"></canvas></div>
    </div>

    <div class="sidebar-right">
        <h4 style="color:gold; margin-top:0;">📡 CHAT JURITY IA</h4>
        <div id="chat-window"></div>
        <input type="text" id="chat-in" class="chat-input" placeholder="Pergunte à IA...">
    </div>

    <script>
        const ctx = document.getElementById('equityChart').getContext('2d');
        let chart = new Chart(ctx, { type:'line', data:{ labels:[], datasets:[{label:'Equity', data:[], borderColor:'gold', fill:true, backgroundColor:'rgba(255,215,0,0.05)', tension:0.3}] }, options:{ maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{grid:{color:'#222'}}} } });
        
        let gatilhos = { WIN: null, WDO: null };

        function falar(t) { const m = new SpeechSynthesisUtterance(t); m.lang='pt-BR'; window.speechSynthesis.speak(m); }

        async function ordem(ativo, tipo) {
            const l = document.getElementById(`l-${ativo.toLowerCase()}`).value;
            const sl = document.getElementById(`sl-${ativo.toLowerCase()}`).value;
            const tp = document.getElementById(`tp-${ativo.toLowerCase()}`).value;
            
            await fetch('/set_order', {method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({ativo, tipo, lotes:l, sl_pts:sl, tp_pts:tp})});
            falar(`${tipo} no ${ativo} enviado.`);
        }

        function execIA(ativo) { if(gatilhos[ativo]) ordem(ativo, gatilhos[ativo].tipo); }

        async function update() {
            try {
                const res = await fetch('/get_signal'); const d = await res.json();
                
                ["win", "wdo"].forEach(a => {
                    document.getElementById(`p-${a}`).innerText = d[a].preco;
                    document.getElementById(`r-${a}`).innerText = `RSI: ${d[a].rsi}`;
                    const banner = document.getElementById(`ia-${a}`);
                    if(d[a].sugestao) {
                        banner.style.display = 'block'; banner.innerText = d[a].sugestao.texto + " | EXECUTAR?";
                        gatilhos[a.toUpperCase()] = d[a].sugestao;
                    } else { banner.style.display = 'none'; }
                });

                document.getElementById('f-saldo').innerText = `R$ ${d.fin.saldo_atual.toFixed(2)}`;
                document.getElementById('f-dia').innerText = `R$ ${d.fin.resultado_dia.toFixed(2)}`;
                document.getElementById('f-aberto').innerText = `R$ ${d.fin.em_aberto.toFixed(2)}`;
                document.getElementById('f-conta').innerText = `CONTA: ${d.fin.conta}`;

                document.getElementById('tabela-corpo').innerHTML = d.posicoes.map(p => `
                    <tr><td>${p.symbol}</td><td class="${p.type==0?'gain':'loss'}">${p.type==0?'BUY':'SELL'}</td><td>${p.volume}</td><td class="${p.profit>=0?'gain':'loss'}">R$ ${p.profit.toFixed(2)}</td><td><b style="color:cyan">SIM</b></td></tr>
                `).join('');

                chart.data.labels = d.historico.map(h => h.horario);
                chart.data.datasets[0].data = d.historico.map(h => h.acumulado);
                chart.update('none');
            } catch(e) {}
        }

        document.getElementById('chat-in').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const box = document.getElementById('chat-window');
                box.innerHTML += `<p><b>Você:</b> ${e.target.value}</p>`;
                const r = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mensagem:e.target.value})});
                const data = await r.json();
                box.innerHTML += `<p style="color:gold"><b>Jurity IA:</b> ${data.resposta}</p>`;
                e.target.value = ''; box.scrollTop = box.scrollHeight;
            }
        });

        setInterval(update, 1000);
    </script>
</body>
</html>
