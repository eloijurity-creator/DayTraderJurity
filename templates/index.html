<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA - Trading Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --border: #333; --green: #00ff88; --red: #ff4d4d; --yellow: #f0b90b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .main-container { max-width: 1200px; margin: 0 auto; text-align: center; }
        
        .logo { width: 90px; margin-bottom: 10px; }
        .account-card { background: var(--card); border: 2px solid var(--yellow); border-radius: 12px; padding: 15px; display: inline-flex; gap: 30px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; text-align: left; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; }

        /* Boleta */
        .boleta { margin-top: 15px; display: flex; gap: 8px; align-items: center; background: #0b0e11; padding: 10px; border-radius: 10px; }
        .input-lotes { width: 60px; background: #1e2329; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; text-align: center; }
        .btn-trade { border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; flex-grow: 1; }
        .btn-buy { background: var(--green); color: black; }
        .btn-sell { background: var(--red); color: white; }

        /* Alerta Dourado */
        .sugestao-box { background: rgba(240, 185, 11, 0.1); border: 2px solid var(--yellow); border-radius: 12px; padding: 12px; margin-top: 15px; display: none; text-align: center; animation: pulse-gold 1.5s infinite; }
        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 0px var(--yellow); } 50% { box-shadow: 0 0 15px var(--yellow); } }

        /* Gráfico e Chat */
        .chart-container { height: 250px; width: 100%; position: relative; }
        .chat-window { height: 150px; overflow-y: auto; background: #0b0e11; padding: 15px; border-radius: 10px; border: 1px solid #333; margin: 10px 0; font-size: 0.9em; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #888; border-bottom: 1px solid #333; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="main-container">
    <img src="/static/logo_jurity.png" class="logo" alt="Jurity IA">
    <div class="account-card">
        <span>CONTA: <b id="conta-id">---</b></span>
        <span>PATRIMÓNIO: <b id="saldo-atual" style="color:var(--green)">R$ 0,00</b></span>
    </div>

    <div class="grid">
        <div class="card">
            <h3 style="color:var(--yellow)">MINI ÍNDICE (WIN)</h3>
            <h1 id="preco-WIN">---</h1>
            <div class="boleta">
                <input type="number" id="lotes-WIN" class="input-lotes" value="1">
                <button class="btn-trade btn-buy" onclick="enviarOrdem('WIN', 'BUY')">COMPRAR</button>
                <button class="btn-trade btn-sell" onclick="enviarOrdem('WIN', 'SELL')">VENDER</button>
            </div>
            <div id="sugestao-WIN" class="sugestao-box">
                <div id="txt-sugestao-WIN" style="font-weight:bold;">---</div>
                <button id="btn-sug-WIN" class="btn-trade" style="width:100%; margin-top:5px; background:white;">EXECUTAR</button>
            </div>
        </div>

        <div class="card">
            <h3 style="color:var(--yellow)">MINI DÓLAR (WDO)</h3>
            <h1 id="preco-WDO">---</h1>
            <div class="boleta">
                <input type="number" id="lotes-WDO" class="input-lotes" value="1">
                <button class="btn-trade btn-buy" onclick="enviarOrdem('WDO', 'BUY')">COMPRAR</button>
                <button class="btn-trade btn-sell" onclick="enviarOrdem('WDO', 'SELL')">VENDER</button>
            </div>
            <div id="sugestao-WDO" class="sugestao-box">
                <div id="txt-sugestao-WDO" style="font-weight:bold;">---</div>
                <button id="btn-sug-WDO" class="btn-trade" style="width:100%; margin-top:5px; background:white;">EXECUTAR</button>
            </div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3>CURVA DE EQUITY</h3>
            <div class="chart-container"><canvas id="perfChart"></canvas></div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3>JURITY ANALISTA (IA)</h3>
            <div id="chat-window" class="chat-window"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-input" style="flex-grow:1; background:#0b0e11; border:1px solid #444; color:white; padding:10px; border-radius:8px;" placeholder="Pergunte algo...">
                <button onclick="enviarChat()" style="background:var(--yellow); border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">ENVIAR</button>
            </div>
        </div>
    </div>

    <div class="card" style="margin-top:20px; width:100%; box-sizing:border-box;">
        <h3>ORDENS EM ABERTO</h3>
        <table>
            <thead><tr><th>ATIVO</th><th>LADO</th><th>SL</th><th>TP</th><th>LUCRO</th><th>AÇÃO</th></tr></thead>
            <tbody id="tabela-ordens"></tbody>
        </table>
    </div>
</div>

<script>
    const ctx = document.getElementById('perfChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Saldo R$', data: [], borderColor: '#f0b90b', tension: 0.3, fill: false }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#222' } } } }
    });

    const beep = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

    async function atualizar() {
        ['WIN', 'WDO'].forEach(async (at) => {
            const r = await fetch('/get_signal?ativo=' + at);
            const d = await r.json();
            document.getElementById('preco-' + at).innerText = d.preco;
            const box = document.getElementById('sugestao-' + at);
            if(d.sugestao !== "NEUTRO") {
                if(box.style.display !== 'block') beep.play();
                box.style.display = 'block';
                document.getElementById('txt-sugestao-' + at).innerText = "SUGESTÃO: " + d.sugestao;
                document.getElementById('btn-sug-' + at).onclick = () => enviarOrdem(at, d.sugestao === "COMPRA" ? "BUY" : "SELL");
            } else { box.style.display = 'none'; }
        });

        const rFin = await fetch('/get_financeiro');
        const fin = await rFin.json();
        document.getElementById('conta-id').innerText = fin.conta;
        document.getElementById('saldo-atual').innerText = "R$ " + fin.saldo_atual.toLocaleString('pt-BR');

        let html = '';
        fin.posicoes.forEach(p => {
            html += `<tr><td>${p.ativo}</td><td>${p.tipo}</td><td>${p.sl}</td><td>${p.tp}</td><td>R$ ${p.lucro}</td><td><button onclick="fechar(${p.ticket})">X</button></td></tr>`;
        });
        document.getElementById('tabela-ordens').innerHTML = html || '<tr><td colspan="6" style="text-align:center">Sem ordens</td></tr>';
    }

    async function updateChart() {
        const res = await fetch('/get_historico');
        const hist = await res.json();
        chart.data.labels = hist.map(h => h.x);
        chart.data.datasets[0].data = hist.map(h => h.y);
        chart.update();
    }

    async function enviarOrdem(ativo, tipo) {
        const lotes = document.getElementById('lotes-' + ativo).value;
        await fetch('/order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ativo, tipo, lotes }) });
        alert("Comando enviado!");
    }

    async function enviarChat() {
        const inp = document.getElementById('chat-input');
        const win = document.getElementById('chat-window');
        if(!inp.value) return;
        win.innerHTML += `<p style="color:var(--yellow)"><b>Você:</b> ${inp.value}</p>`;
        const r = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ mensagem: inp.value }) });
        const d = await r.json();
        win.innerHTML += `<p style="color:var(--green)"><b>IA:</b> ${d.resposta}</p>`;
        win.scrollTop = win.scrollHeight;
        inp.value = '';
    }

    setInterval(atualizar, 2000);
    setInterval(updateChart, 5000);
</script>
</body>
</html>
