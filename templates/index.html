<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA - v2.5 Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --border: #333; --green: #00ff88; --red: #ff4d4d; --yellow: #f0b90b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .logo { width: 100px; filter: drop-shadow(0 0 5px var(--yellow)); margin-bottom: 15px; }
        
        /* Barra Financeira */
        .account-bar { background: var(--card); border: 2px solid var(--yellow); border-radius: 12px; padding: 15px; display: flex; justify-content: center; gap: 40px; margin-bottom: 25px; width: 100%; max-width: 1200px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .acc-item { text-align: center; }
        .acc-label { font-size: 0.7em; color: #888; text-transform: uppercase; display: block; }
        .acc-val { font-size: 1.2em; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; }

        /* Boleta e Caixa Dourada */
        .boleta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; background: #0b0e11; padding: 15px; border-radius: 10px; }
        .sugestao-ia { background: rgba(240, 185, 11, 0.15); border: 2px solid var(--yellow); border-radius: 10px; padding: 15px; margin-top: 15px; text-align: center; display: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0px var(--yellow); } 50% { box-shadow: 0 0 15px var(--yellow); } }
        .nota-badge { background: var(--yellow); color: black; padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        input { background: #1e2329; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; text-align: center; width: 100%; box-sizing: border-box; }
        button { border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-panic { background: var(--red); color: white; border: 1px solid white; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <img src="/static/logo_jurity.png" class="logo">
    
    <div class="account-bar">
        <div class="acc-item"><span class="acc-label">Conta</span><span class="acc-val" id="conta-id">---</span></div>
        <div class="acc-item"><span class="acc-label">Patrimônio</span><span class="acc-val" id="saldo-atual" style="color:var(--green)">R$ 0,00</span></div>
        <div class="acc-item"><span class="acc-label">Lucro Hoje (Fechado)</span><span class="acc-val" id="res-dia">R$ 0,00</span></div>
        <div class="acc-item"><span class="acc-label">Ordens em Aberto</span><span class="acc-val" id="aberto-total">R$ 0,00</span></div>
    </div>

    <div class="grid">
        <div class="card">
            <h3 style="color:var(--yellow)">ÍNDICE (WIN) - <span id="preco-WIN">---</span></h3>
            <div class="boleta">
                <div style="grid-column: span 3;"><small>Lotes</small><input type="number" id="lotes-WIN" value="1"></div>
                <div><small>SL</small><input type="number" id="sl-WIN"></div>
                <div><small>TP</small><input type="number" id="tp-WIN"></div>
                <button onclick="ordem('WIN','BUY')" style="background:var(--green)">Compra</button>
                <button onclick="ordem('WIN','SELL')" style="background:var(--red); color:white; grid-column: span 2;">Venda</button>
            </div>
            <div id="sug-WIN" class="sugestao-ia">
                <div style="font-size:0.7em; color:var(--yellow)">RECOMENDAÇÃO JURITY IA</div>
                <div style="font-weight:bold; margin:5px 0;"><span id="txt-sug-WIN">---</span> | <span class="nota-badge" id="nota-WIN">0.0</span></div>
                <button style="background:white; color:black; width:100%" id="btn-exec-WIN">EXECUTAR AGORA</button>
            </div>
        </div>

        <div class="card">
            <h3 style="color:var(--yellow)">DÓLAR (WDO) - <span id="preco-WDO">---</span></h3>
            <div class="boleta">
                <div style="grid-column: span 3;"><small>Lotes</small><input type="number" id="lotes-WDO" value="1"></div>
                <div><small>SL</small><input type="number" id="sl-WDO"></div>
                <div><small>TP</small><input type="number" id="tp-WDO"></div>
                <button onclick="ordem('WDO','BUY')" style="background:var(--green)">Compra</button>
                <button onclick="ordem('WDO','SELL')" style="background:var(--red); color:white; grid-column: span 2;">Venda</button>
            </div>
            <div id="sug-WDO" class="sugestao-ia">
                <div style="font-size:0.7em; color:var(--yellow)">RECOMENDAÇÃO JURITY IA</div>
                <div style="font-weight:bold; margin:5px 0;"><span id="txt-sug-WDO">---</span> | <span class="nota-badge" id="nota-WDO">0.0</span></div>
                <button style="background:white; color:black; width:100%" id="btn-exec-WDO">EXECUTAR AGORA</button>
            </div>
        </div>

        <div class="card" style="grid-column: span 2; height: 250px;"><canvas id="perfChart"></canvas></div>

        <div class="card" style="grid-column: span 2;">
            <h3>JURITY ANALISTA (GEMINI 2.5 FLASH)</h3>
            <div id="chat-win" style="height:150px; overflow-y:auto; background:#0b0e11; padding:15px; border-radius:10px; border:1px solid #333; margin-bottom:10px;"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="user-input" placeholder="Digite e aperte Enter...">
                <button onclick="enviarChat()" style="background:var(--yellow); color:black;">ENVIAR</button>
            </div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h4>ORDENS EM ABERTO</h4>
                <button class="btn-panic" onclick="panic()">PÂNICO: ZERAR TUDO</button>
            </div>
            <table>
                <thead><tr><th>Ativo</th><th>Lado</th><th>Lote</th><th>Lucro</th><th>Ação</th></tr></thead>
                <tbody id="tabela-ordens"></tbody>
            </table>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('perfChart').getContext('2d');
        const chart = new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ label: 'Saldo R$', data: [], borderColor: '#f0b90b', tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false } });

        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviarChat(); });

        async function atualizar() {
            ['WIN', 'WDO'].forEach(async (at) => {
                const r = await fetch('/get_signal?ativo=' + at);
                const d = await r.json();
                document.getElementById('preco-' + at).innerText = d.preco;
                
                const box = document.getElementById('sug-' + at);
                if(d.alvos && d.alvos.sinal !== "NEUTRO") {
                    box.style.display = 'block';
                    document.getElementById('txt-sug-' + at).innerText = d.alvos.sinal;
                    document.getElementById('nota-' + at).innerText = d.alvos.score;
                    document.getElementById('btn-exec-' + at).onclick = () => ordem(at, d.alvos.sinal === "COMPRA" ? "BUY" : "SELL");
                } else { box.style.display = 'none'; }
            });

            const rFin = await fetch('/get_financeiro');
            const fin = await rFin.json();
            document.getElementById('conta-id').innerText = fin.conta;
            document.getElementById('saldo-atual').innerText = "R$ " + fin.saldo_atual.toLocaleString('pt-BR');
            
            // CORREÇÃO VISUAL: Lucro Hoje Corrigido
            const resDia = document.getElementById('res-dia');
            resDia.innerText = "R$ " + fin.resultado_dia.toLocaleString('pt-BR');
            resDia.style.color = fin.resultado_dia >= 0 ? 'var(--green)' : 'var(--red)';

            let somaAberto = fin.posicoes.reduce((acc, p) => acc + (p.profit || p.lucro), 0);
            const elAberto = document.getElementById('aberto-total');
            elAberto.innerText = "R$ " + somaAberto.toLocaleString('pt-BR');
            elAberto.style.color = somaAberto >= 0 ? 'var(--green)' : 'var(--red)';

            let html = '';
            fin.posicoes.forEach(p => {
                html += `<tr><td>${p.symbol || p.ativo}</td><td style="color:${p.type==0?'#0f8':'#f44'}">${p.type==0?'BUY':'SELL'}</td><td>${p.volume || p.lotes}</td><td>R$ ${(p.profit || p.lucro).toFixed(2)}</td><td><button onclick="fechar(${p.ticket})">Fechar</button></td></tr>`;
            });
            document.getElementById('tabela-ordens').innerHTML = html || '<tr><td colspan="5" style="text-align:center">Nenhuma ordem ativa.</td></tr>';
        }

        async function ordem(ativo, tipo) {
            const lotes = document.getElementById('lotes-' + ativo).value;
            const sl = document.getElementById('sl-' + ativo).value;
            const tp = document.getElementById('tp-' + ativo).value;
            await fetch('/order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ativo, tipo, lotes, sl, tp }) });
            alert("Ordem enviada!");
        }

        async function panic() { if(confirm("ZERAR TUDO?")) await fetch('/order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tipo: 'PANIC' }) }); }

        async function enviarChat() {
            const inp = document.getElementById('user-input');
            const win = document.getElementById('chat-win');
            if(!inp.value) return;
            const msg = inp.value; inp.value = '';
            win.innerHTML += `<p style="color:var(--yellow)"><b>Você:</b> ${msg}</p>`;
            const r = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ mensagem: msg }) });
            const d = await r.json();
            win.innerHTML += `<p style="color:var(--green)"><b>Jurity:</b> ${d.resposta}</p>`;
            win.scrollTop = win.scrollHeight;
        }

        setInterval(atualizar, 2000);
        setInterval(() => {
            fetch('/get_historico').then(r => r.json()).then(hist => {
                chart.data.labels = hist.map(h => h.x);
                chart.data.datasets[0].data = hist.map(h => h.y);
                chart.update();
            });
        }, 5000);
    </script>
</body>
</html>
