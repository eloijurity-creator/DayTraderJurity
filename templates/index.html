<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA - Master Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --border: #333; --green: #00ff88; --red: #ff4d4d; --yellow: #f0b90b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th { text-align: left; color: #888; padding: 8px; border-bottom: 1px solid #333; }
        td { padding: 8px; border-bottom: 1px solid #222; }
        .alert-sl { color: var(--red); font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h2 style="color:var(--yellow)">Jurity IA <small style="color:#555">| Account: <span id="conta-id">---</span></small></h2>
    
    <div class="dashboard">
        <div class="card">
            <h4><i class="fas fa-wallet"></i> R$ Diário: <span id="res-dia" style="color:var(--green)">0.00</span></h4>
            <p>Saldo Equity: R$ <span id="saldo-atual">0.00</span></p>
        </div>
        <div class="card" style="grid-column: span 2;">
            <canvas id="perfChart" height="100"></canvas>
        </div>
    </div>

    <div class="card" style="margin-top:20px">
        <h5><i class="fas fa-shield-alt"></i> Gerenciamento de Ordens & Stops</h5>
        <table>
            <thead>
                <tr><th>Ativo</th><th>Lado</th><th>Entrada</th><th>Stop Loss</th><th>Take Profit</th><th>Dist. SL</th><th>Lucro</th></tr>
            </thead>
            <tbody id="tabela-ordens"></tbody>
        </table>
    </div>

    <script>
        const ctx = document.getElementById('perfChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Equity R$', data: [], borderColor: '#f0b90b', tension: 0.2, fill: false }] },
            options: { responsive: true, scales: { y: { grid: { color: '#222' } }, x: { display: false } } }
        });

        async function update() {
            const resFin = await fetch('/get_financeiro');
            const fin = await resFin.json();
            
            document.getElementById('res-dia').innerText = fin.resultado_dia.toFixed(2);
            document.getElementById('saldo-atual').innerText = fin.saldo_atual.toFixed(2);
            document.getElementById('conta-id').innerText = fin.conta;

            let html = '';
            fin.posicoes.forEach(p => {
                const slClass = p.dist_sl_pontos < 40 ? 'alert-sl' : '';
                html += `<tr>
                    <td><b>${p.ativo}</b></td>
                    <td style="color:${p.tipo=='COMPRA'?'#0f8':'#f44'}">${p.tipo}</td>
                    <td>${p.preco_abertura}</td>
                    <td style="color:var(--red)">${p.sl || 'N/A'}</td>
                    <td style="color:var(--green)">${p.tp || 'N/A'}</td>
                    <td class="${slClass}">${p.dist_sl_pontos} pts</td>
                    <td style="font-weight:bold">R$ ${p.lucro}</td>
                </tr>`;
            });
            document.getElementById('tabela-ordens').innerHTML = html || '<tr><td colspan="7">Nenhuma ordem aberta</td></tr>';
        }

        async function updateChart() {
            const res = await fetch('/get_historico');
            const hist = await res.json();
            chart.data.labels = hist.map(d => d.x);
            chart.data.datasets[0].data = hist.map(d => d.y);
            chart.update();
        }

        setInterval(update, 2000);
        setInterval(updateChart, 5000);
    </script>
</body>
</html>
