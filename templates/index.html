<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA 2.5 Flash</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .status-bar { width: 850px; background: #1e2329; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; border: 1px solid #333; margin-bottom: 15px; }
        .card { background: #1e2329; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 400px; text-align: center; }
        .price { font-size: 42px; color: #f0b90b; font-weight: bold; margin: 10px 0; }
        .btn-ia { display: none; background: #f0b90b; color: black; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: 800; cursor: pointer; margin-bottom: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02); background: #fff;} 100% {transform: scale(1);} }
        .gain { color: #02c076; } .loss { color: #cf304a; }
        table { width: 850px; border-collapse: collapse; background: #1e2329; margin-top: 15px; font-size: 12px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
    </style>
</head>
<body>
    <h2 style="color:#f0b90b">JURITY IA 2.5 FLASH 🦅 (SEMI-AUTO)</h2>
    
    <div class="status-bar">
        <span>CONTA: <b id="f-conta">--</b></span>
        <span>PATRIMÔNIO: <b id="f-saldo">R$ 0,00</b></span>
        <span>HOJE: <b id="f-dia">R$ 0,00</b></span>
    </div>

    <div style="display:flex; gap:15px;">
        <div class="card">
            <h3>MINI ÍNDICE <span id="r-win" style="font-size:12px; opacity:0.6">RSI: --</span></h3>
            <button id="ia-btn-win" class="btn-ia" onclick="execIA('WIN')"></button>
            <div id="p-win" class="price">0</div>
            <div>TENDÊNCIA: <b id="t-win">--</b></div>
            <div style="margin:10px 0">LOTES: <input type="number" id="l-win" value="1" style="width:40px; background:black; color:white;"></div>
            <div style="display:flex; justify-content: space-between;">
                <button style="background:#02c076; color:white; border:none; padding:10px; width:48%;" onclick="ordem('WIN','BUY')">COMPRAR</button>
                <button style="background:#cf304a; color:white; border:none; padding:10px; width:48%;" onclick="ordem('WIN','SELL')">VENDER</button>
            </div>
        </div>
        <div class="card">
            <h3>MINI DÓLAR <span id="r-wdo" style="font-size:12px; opacity:0.6">RSI: --</span></h3>
            <button id="ia-btn-wdo" class="btn-ia" onclick="execIA('WDO')"></button>
            <div id="p-wdo" class="price">0</div>
            <div>TENDÊNCIA: <b id="t-wdo">--</b></div>
            <div style="margin:10px 0">LOTES: <input type="number" id="l-wdo" value="1" style="width:40px; background:black; color:white;"></div>
            <div style="display:flex; justify-content: space-between;">
                <button style="background:#02c076; color:white; border:none; padding:10px; width:48%;" onclick="ordem('WDO','BUY')">COMPRAR</button>
                <button style="background:#cf304a; color:white; border:none; padding:10px; width:48%;" onclick="ordem('WDO','SELL')">VENDER</button>
            </div>
        </div>
    </div>

    <button onclick="ordem('ALL','PANIC')" style="width:850px; background:red; border:none; padding:15px; margin-top:10px; font-weight:bold; color:white; cursor:pointer;">🚨 ZERAR TUDO 🚨</button>

    <table>
        <thead><tr><th>ATIVO</th><th>LADO</th><th>VOL</th><th>PREÇO</th><th>LUCRO</th></tr></thead>
        <tbody id="t-posicoes"></tbody>
    </table>

    <script>
        let gatilhos = { WIN: null, WDO: null };

        async function ordem(ativo, tipo, lotes=null) {
            const v = lotes || document.getElementById(`l-${ativo.toLowerCase()}`).value;
            await fetch('/set_order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ativo, tipo, lotes:v})});
        }

        function execIA(ativo) {
            if(gatilhos[ativo]) {
                ordem(ativo, gatilhos[ativo].acao);
                alert("Ordem Sugerida Enviada!");
            }
        }

        async function update() {
            const res = await fetch('/get_signal'); const d = await res.json();
            
            // Sync WIN
            document.getElementById('p-win').innerText = d.win.preco;
            document.getElementById('r-win').innerText = `RSI: ${d.win.rsi}`;
            document.getElementById('t-win').innerText = d.win.tend;
            const btnW = document.getElementById('ia-btn-win');
            if(d.win.decisao) { 
                btnW.style.display = 'block'; btnW.innerText = d.win.decisao.msg; 
                gatilhos.WIN = d.win.decisao;
            } else { btnW.style.display = 'none'; }

            // Sync WDO
            document.getElementById('p-wdo').innerText = d.wdo.preco;
            const btnD = document.getElementById('ia-btn-wdo');
            if(d.wdo.decisao) { 
                btnD.style.display = 'block'; btnD.innerText = d.wdo.decisao.msg; 
                gatilhos.WDO = d.wdo.decisao;
            } else { btnD.style.display = 'none'; }

            // Financeiro
            document.getElementById('f-conta').innerText = d.fin.conta;
            document.getElementById('f-saldo').innerText = `R$ ${d.fin.saldo_atual.toFixed(2)}`;
            document.getElementById('f-dia').innerText = `R$ ${d.fin.resultado_dia.toFixed(2)}`;
            
            document.getElementById('t-posicoes').innerHTML = d.posicoes.map(p => `
                <tr><td>${p.symbol}</td><td class="${p.type==0?'gain':'loss'}">${p.type==0?'COMPRA':'VENDA'}</td><td>${p.volume}</td><td>${p.price_open}</td><td class="${p.profit>=0?'gain':'loss'}">R$ ${p.profit.toFixed(2)}</td></tr>
            `).join('');
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
