<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jurity IA Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e2329; border: 1px solid #333; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        .btn-fechar { background: #ff4d4d; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Jurity IA | Conta: <span id="conta-id">---</span></h2>
    
    <div class="card">
        <canvas id="perfChart" height="80"></canvas>
    </div>

    <div class="card">
        <h3>Ordens em Aberto</h3>
        <table>
            <thead>
                <tr><th>Ativo</th><th>Lado</th><th>SL</th><th>TP</th><th>Dist. SL</th><th>Lucro</th><th>Ação</th></tr>
            </thead>
            <tbody id="tabela-ordens"></tbody>
        </table>
    </div>

    <script>
        const ctx = document.getElementById('perfChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Saldo (R$)', data: [], borderColor: '#f0b90b', fill: false }] }
        });

        async function update() {
            const res = await fetch('/get_financeiro');
            const data = await res.json();
            document.getElementById('conta-id').innerText = data.conta;

            let html = '';
            data.posicoes.forEach(p => {
                html += `<tr>
                    <td>${p.ativo}</td>
                    <td style="color:${p.tipo=='COMPRA'?'#0f8':'#f44'}">${p.tipo}</td>
                    <td>${p.sl}</td><td>${p.tp}</td>
                    <td>${p.dist_sl} pts</td>
                    <td>R$ ${p.lucro}</td>
                    <td><button class="btn-fechar" onclick="fechar(${p.ticket})">Fechar</button></td>
                </tr>`;
            });
            document.getElementById('tabela-ordens').innerHTML = html || '<tr><td colspan="7">Nenhuma ordem</td></tr>';
        }

        async function updateChart() {
            const res = await fetch('/get_historico');
            const hist = await res.json();
            chart.data.labels = hist.map(d => d.x);
            chart.data.datasets[0].data = hist.map(d => d.y);
            chart.update();
        }

        async function fechar(ticket) {
            await fetch('/fechar_ordem', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ticket}) });
            alert("Comando de fechamento enviado!");
        }

        setInterval(update, 2000);
        setInterval(updateChart, 5000);
    </script>
</body>
</html>
